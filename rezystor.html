<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator rezystora</title>
    <link rel="stylesheet" href="styl.css">
</head>
<body>

<div class="container">
    <h1>Kalkulator kodu paskowego rezystora</h1>

    <div class="select-box">
        <label>Ilość pasków: </label>
        <select id="bandCount">
            <option value="4">4 paski</option>
            <option value="5">5 pasków</option>
        </select>
    </div>

    <button onclick="calculate()">Oblicz</button>

    <div class="result" id="result"></div>

    <div class="resistor-container">
        <div class="wire"></div>
        <div class="resistor" id="resistor"></div>
        <div class="wire"></div>
    </div>

    <div class="table-section">
        <h2>Tabela kodu 4 paskowego</h2>
        <img src="obliczaniere.png" class="table-image">
    </div>
    <div class="table-section">
        <h2>Tabela kodu 5 paskowego</h2>
        <img src="5r.png" class="table-image">
    </div>
</div>

<script>
const data = {
  digits: {
    "czarny": 0,
    "brązowy": 1,
    "czerwony": 2,
    "pomarańczowy": 3,
    "żółty": 4,
    "zielony": 5,
    "niebieski": 6,
    "fioletowy": 7,
    "szary": 8,
    "biały": 9
  },
  multipliers: {
    "czarny": 1,
    "brązowy": 10,
    "czerwony": 100,
    "pomarańczowy": 1000,
    "żółty": 10000,
    "zielony": 100000,
    "niebieski": 1000000,
    "złoty": 0.1,
    "srebrny": 0.01
  },
  tolerances: {
    "brązowy": "±1%",
    "czerwony": "±2%",
    "zielony": "±0.5%",
    "niebieski": "±0.25%",
    "fioletowy": "±0.1%",
    "złoty": "±5%",
    "srebrny": "±10%"
  }
};

let selectedColors = [];

document.getElementById("bandCount").addEventListener("change", generateBands);

generateBands();

function generateBands() {
    const count = parseInt(document.getElementById("bandCount").value);
    const resistor = document.getElementById("resistor");
    resistor.innerHTML = "";
    selectedColors = new Array(count).fill(null);

    for (let i = 0; i < count; i++) {
        let band = document.createElement("div");
        band.className = "band";
        band.dataset.index = i;
        band.onclick = openPalette;
        resistor.appendChild(band);
    }
}

function openPalette(e) {
    const index = e.target.dataset.index;

    const palette = document.createElement("div");
    palette.className = "palette";

    let allowedColors = getAllowedColors(index);

    allowedColors.forEach(color => {
        let swatch = document.createElement("div");
        swatch.className = "color-swatch";
        swatch.style.backgroundColor = convertColor(color);
        swatch.onclick = () => {
            selectedColors[index] = color;
            e.target.style.backgroundColor = convertColor(color);
            document.body.removeChild(palette);
            calculate();
        };
        palette.appendChild(swatch);
    });

    palette.style.top = e.pageY + "px";
    palette.style.left = e.pageX + "px";

    document.body.appendChild(palette);
}

function getAllowedColors(index) {
    const count = selectedColors.length;

    if (count === 4) {
        if (index < 2) return Object.keys(data.digits);
        if (index === 2) return Object.keys(data.multipliers);
        return Object.keys(data.tolerances);
    }

    if (count === 5) {
        if (index < 3) return Object.keys(data.digits);
        if (index === 3) return Object.keys(data.multipliers);
        return Object.keys(data.tolerances);
    }
}

function calculate() {
    if (selectedColors.includes(null)) return;

    let value = 0;
    let tolerance = "";

    if (selectedColors.length === 4) {
        value = (
            data.digits[selectedColors[0]] * 10 +
            data.digits[selectedColors[1]]
        ) * data.multipliers[selectedColors[2]];

        tolerance = data.tolerances[selectedColors[3]];
    }

    if (selectedColors.length === 5) {
        value = (
            data.digits[selectedColors[0]] * 100 +
            data.digits[selectedColors[1]] * 10 +
            data.digits[selectedColors[2]]
        ) * data.multipliers[selectedColors[3]];

        tolerance = data.tolerances[selectedColors[4]];
    }

    document.getElementById("result").innerHTML =
        "Rezystancja: " + formatValue(value) + " Ω " + tolerance;
}

function formatValue(val) {
    if (val >= 1000000) return (val/1000000) + " M";
    if (val >= 1000) return (val/1000) + " k";
    return val;
}

function convertColor(color) {
    const map = {
        "czarny": "black",
        "brązowy": "brown",
        "czerwony": "red",
        "pomarańczowy": "orange",
        "żółty": "yellow",
        "zielony": "green",
        "niebieski": "blue",
        "fioletowy": "violet",
        "szary": "gray",
        "biały": "white",
        "złoty": "gold",
        "srebrny": "silver"
    };
    return map[color];
}
</script>

</body>
</html>
