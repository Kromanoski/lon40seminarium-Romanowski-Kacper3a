<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator rezystora</title>
    <link rel="stylesheet" href="styl.css">
</head>
<body>

<div class="container">
    <h1>Kalkulator kodu paskowego rezystora</h1>

    <div class="select-box">
        <label>Ilość pasków: </label>
        <select id="bandCount">
            <option value="4">4 paski</option>
            <option value="5">5 pasków</option>
        </select>
    </div>

    <div class="color-selectors" id="selectors"></div>

    <button onclick="calculate()">Oblicz</button>

    <div class="result" id="result"></div>

    <div class="resistor-container">
        <div class="wire"></div>
        <div class="resistor" id="resistor"></div>
        <div class="wire"></div>
    </div>

    <div class="table-section">
        <h2>Tabela kodu 4 paskowego</h2>
        <img src="obliczaniere.png" class="table-image">
    </div>
    <div class="table-section">
        <h2>Tabela kodu 5 paskowego</h2>
        <img src="5r.png" class="table-image">
    </div>
</div>

<script>
const data = {
  digits: {
    "czarny": 0,
    "brązowy": 1,
    "czerwony": 2,
    "pomarańczowy": 3,
    "żółty": 4,
    "zielony": 5,
    "niebieski": 6,
    "fioletowy": 7,
    "szary": 8,
    "biały": 9
  },
  multipliers: {
    "czarny": 1,
    "brązowy": 10,
    "czerwony": 100,
    "pomarańczowy": 1000,
    "żółty": 10000,
    "zielony": 100000,
    "niebieski": 1000000,
    "złoty": 0.1,
    "srebrny": 0.01
  },
  tolerances: {
    "brązowy": "±1%",
    "czerwony": "±2%",
    "zielony": "±0.5%",
    "niebieski": "±0.25%",
    "fioletowy": "±0.1%",
    "złoty": "±5%",
    "srebrny": "±10%"
  }
};

document.getElementById("bandCount").addEventListener("change", generateSelectors);

generateSelectors();

function generateSelectors() {
    const count = parseInt(document.getElementById("bandCount").value);
    const container = document.getElementById("selectors");
    const resistor = document.getElementById("resistor");

    container.innerHTML = "";
    resistor.innerHTML = "";

    for (let i = 0; i < count; i++) {
        let select = document.createElement("select");

        if (count === 4) {
            if (i < 2) select.innerHTML = getOptions(data.digits);
            else if (i === 2) select.innerHTML = getOptions(data.multipliers);
            else select.innerHTML = getOptions(data.tolerances);
        }

        if (count === 5) {
            if (i < 3) select.innerHTML = getOptions(data.digits);
            else if (i === 3) select.innerHTML = getOptions(data.multipliers);
            else select.innerHTML = getOptions(data.tolerances);
        }

        select.onchange = updateBands;
        container.appendChild(select);

        let band = document.createElement("div");
        band.className = "band";
        resistor.appendChild(band);
    }

    updateBands();
}

function getOptions(obj) {
    return Object.keys(obj)
        .map(color => `<option value="${color}">${color}</option>`)
        .join("");
}

function updateBands() {
    const selects = document.querySelectorAll("#selectors select");
    const bands = document.querySelectorAll(".band");

    const map = {
        "czarny": "black",
        "brązowy": "brown",
        "czerwony": "red",
        "pomarańczowy": "orange",
        "żółty": "yellow",
        "zielony": "green",
        "niebieski": "blue",
        "fioletowy": "violet",
        "szary": "gray",
        "biały": "white",
        "złoty": "gold",
        "srebrny": "silver"
    };

    selects.forEach((select, index) => {
        bands[index].style.backgroundColor = map[select.value];
    });
}

function calculate() {
    const selects = document.querySelectorAll("#selectors select");
    const count = selects.length;

    let value = 0;
    let tolerance = "";

    if (count === 4) {
        value = (
            data.digits[selects[0].value] * 10 +
            data.digits[selects[1].value]
        ) * data.multipliers[selects[2].value];

        tolerance = data.tolerances[selects[3].value];
    }

    if (count === 5) {
        value = (
            data.digits[selects[0].value] * 100 +
            data.digits[selects[1].value] * 10 +
            data.digits[selects[2].value]
        ) * data.multipliers[selects[3].value];

        tolerance = data.tolerances[selects[4].value];
    }

    document.getElementById("result").innerHTML =
        "Rezystancja: " + formatValue(value) + " Ω " + tolerance;
}

function formatValue(val) {
    if (val >= 1000000) return (val/1000000) + " M";
    if (val >= 1000) return (val/1000) + " k";
    return val;
}
</script>

</body>
</html>
